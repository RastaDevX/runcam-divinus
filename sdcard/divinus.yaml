system:
  sensor_config: /etc/sensors/imx335_fpv.bin
  watchdog: 30

isp:
  mirror: false
  flip: false
  antiflicker: 60

mp4:
  enable: true
  codec: H.265
  mode: AVBR
  width: 1024
  height: 576
  fps: 30
  gop: 30
  profile: HP
  bitrate: 5600

stream:
  enable: true
  dest:
    - udp://127.0.0.1:5600

rtsp:
  enable: false

jpeg:
  enable: false
